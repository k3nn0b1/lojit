<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lojit | Sua Plataforma Profissional</title>
    <meta
      name="description"
      content="Crie sua loja agora com a melhor tecnologia de vendas. Performance, design premium e gestão simplificada."
    />
    <meta name="author" content="Lojit" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta
      property="og:title"
      content="Lojit | Sua Plataforma Profissional"
    />
    <meta
      property="og:description"
      content="Crie sua loja agora com a melhor tecnologia de vendas."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="/favicon.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lojaonline" />
    <meta
      name="twitter:image"
      content="/favicon.png"
    />
  </head>

  <body>
    <div id="root">
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
          <div style="position: relative; width: 72px; height: 72px; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; inset: -20px; background: rgba(255, 255, 255, 0.1); filter: blur(20px); border-radius: 50%; animation: pulse-glow 2s ease-in-out infinite alternate;"></div>
            <img src="/favicon.png" alt="Lojit" style="width: 100%; height: 100%; object-fit: contain; animation: pulse-scale 2s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; position: relative; z-index: 10; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));" />
          </div>
          <style>
            @keyframes pulse-scale {
              0% { transform: scale(0.95); opacity: 0.8; }
              100% { transform: scale(1.05); opacity: 1; }
            }
            @keyframes pulse-glow {
              0% { transform: scale(0.8); opacity: 0.3; }
              100% { transform: scale(1.2); opacity: 0.8; }
            }
          </style>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
